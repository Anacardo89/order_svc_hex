
networks:
  order-svc-network:

volumes:
  order-svc-db-volume:
  order-svc-kafka-volume:
  order-svc-loki-volume:
  order-svc-tempo-volume:

services:
  # order_svc
  order_svc:
    build:
      context: ./order_svc
    container_name: order_svc
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      loki:
        condition: service_started
    environment:
      APP_HOME:            ${APP_HOME_SVC}
      CFG_PATH:            ${CFG_PATH}
      PORT:                ${GRPC_PORT}
      DB_DSN:              ${DB_DSN}
      KAFKA_BROKER:        ${KAFKA_BROKER}
      LOKI_ENDPOINT:       ${LOKI_ENDPOINT}
      TEMPO_ENDPOINT:      ${TEMPO_ENDPOINT}
      PROMETHEUS_ENDPOINT: ${PROMETHEUS_ENDPOINT}
    ports:
      - "${GRPC_PORT}:${GRPC_PORT}"
    networks:
      - order-svc-network
  # order_api
  order_api:
    build:
      context: ./order_api
    container_name: order_api
    depends_on:
      order_svc:
        condition: service_started
    environment:
      APP_HOME:            ${APP_HOME_API}
      CFG_PATH:            ${CFG_PATH}
      HOST:                ${HOST}
      PORT:                ${PORT}
      GRPC_HOST:           ${GRPC_HOST}
      GRPC_PORT:           ${GRPC_PORT}
      KAFKA_BROKER:        ${KAFKA_BROKER}
      LOKI_ENDPOINT:       ${LOKI_ENDPOINT}
      TEMPO_ENDPOINT:      ${TEMPO_ENDPOINT}
      PROMETHEUS_ENDPOINT: ${PROMETHEUS_ENDPOINT}
    ports:
      - "${PORT}:${PORT}"
    networks:
      - order-svc-network
  # DB
  db:
    image: postgres:16
    container_name: order-svc-db
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout:  5s
      retries:  10
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - order-svc-db-volume:/var/lib/postgresql/data
    networks:
      - order-svc-network
  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "9092:9092"
    volumes:
      - ./scripts/create-topics.sh:/docker-entrypoint-initdb.d/create-topics.sh
      - order-svc-kafka-volume:/var/lib/kafka/data
    networks:
      - order-svc-network
  # Loki
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    user: "0:0"
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - order-svc-loki-volume:/tmp/loki
    networks:
      - order-svc-network
  # Tempo
  tempo:
    image: grafana/tempo:2.4.0
    container_name: tempo
    user: "0:0"
    command: -config.file=/etc/tempo.yaml
    ports:
      - "3200:3200" # UI
      - "4317:4317" # gRPC
      - "4318:4318" # HTTP
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml
      - order-svc-tempo-volume:/var/tempo
    networks:
      - order-svc-network
  #Grafana
  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    depends_on:
      - loki
      - tempo
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - order-svc-network