apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: order-system

commonLabels:
  app.kubernetes.io/part-of: order-system
  app.kubernetes.io/managed-by: kustomize

resources:
  - order-system/order_api
  - order-system/order_svc
  - order-system/postgres

helmCharts:
- name: postgresql
  repo: https://charts.bitnami.com/bitnami
  version: 15.5.x
  releaseName: order-db
  namespace: order-system
  valuesFile: order-system/postgres/values.yaml