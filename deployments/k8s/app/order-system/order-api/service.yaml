apiVersion: v1
kind: Service
metadata:
  name: order-api-service
  namespace: order-system
  labels:
    part-of: order-system
spec:
  selector:
    app: order-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
    - name: metrics
      port: 8081
      targetPort: 8081
  type: ClusterIP