adminPassword: admin
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local
        isDefault: true
      - name: Loki
        type: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        jsonData:
          derivedFields:
            - name: "TraceID"
              matcherRegex: '"trace_id":"(\w+)"'
              url: "$${__value.raw}"
              datasourceUid: "tempo"
              internal: true
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.monitoring.svc.cluster.local:3100
        jsonData:
          nodeGraph:
            enabled: true
          lokiSearch:
            datasourceUid: loki